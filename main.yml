name: Build Mod

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up JDK 17
        uses: actions/setup-java@v2
        with:
          java-version: '17'
          distribution: 'adopt'
      - name: Setup Gradle
        run: |
          chmod +x gradlew
          ./gradlew build
      - name: Upload mod jar
        uses: actions/upload-artifact@v2
        with:
          name: mod-jar
          path: build/libs/*.jar
